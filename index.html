<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">

<meta
    name="viewport"
    content="
        width=device-width,
        initial-scale=1.0,
        maximum-scale=1.0,
        user-scalable=no
    "
>

<title>
    LUMORA - Belanja Praktis
</title>

<script src="https://cdn.tailwindcss.com"></script>

<link
    rel="preconnect"
    href="https://fonts.googleapis.com"
>

<link
    rel="preconnect"
    href="https://fonts.gstatic.com"
    crossorigin
>

<link
    href="
https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap
    "
    rel="stylesheet"
>

<script>

tailwind.config = {

    theme: {

        extend: {

            fontFamily: {

                sans: [
                    'Inter',
                    'sans-serif'
                ]
            }
        }
    }
};

</script>

<link
    rel="stylesheet"
    href="/assets/css/style.css"
>

</head>

<body class="bg-white text-slate-800">


<!-- =========================================================
     HEADER
========================================================= -->

<header
    id="hdr"

    class="
        fixed
        top-0
        left-0
        right-0
        z-40
        bg-white/90
        backdrop-blur-lg
        border-b
        border-slate-100
    "
>

    <div class="
        flex
        items-center
        justify-between
        px-4
        h-14
    ">

        <div class="
            flex
            items-center
            gap-3
        ">

            <div class="
                w-10
                h-10
                rounded-xl
                overflow-hidden
                bg-blue-600
                flex
                items-center
                justify-center
                shrink-0
            ">

                <img
                    src="/assets/img/lumora.png"
                    alt="LUMORA"

                    class="
                        w-full
                        h-full
                        object-cover
                    "
                >

            </div>

            <div class="
                flex
                flex-col
                justify-center
                leading-tight
            ">

                <h1 class="
                    text-[15px]
                    font-bold
                    text-slate-800
                ">
                    LUMORA
                </h1>

                <p class="
                    text-[10px]
                    text-slate-400
                ">
                    Belanja Mudah
                </p>

            </div>

        </div>

        <button
            data-act="search"

            class="
                w-9
                h-9
                flex
                items-center
                justify-center
                rounded-xl
                bg-slate-50
                tap
            "
        >

            <svg
                class="
                    w-[18px]
                    h-[18px]
                    text-slate-500
                "

                fill="none"
                stroke="currentColor"
                viewBox="0 0 24 24"
            >

                <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    stroke-width="2"

                    d="
                        M21 21l-6-6
                        m2-5
                        a7 7 0 11-14 0
                        7 7 0 0114 0z
                    "
                />

            </svg>

        </button>

    </div>

</header>


<!-- =========================================================
     MAIN
========================================================= -->

<main class="pt-14 pb-nav">


    <!-- =====================================================
         HOME PAGE
    ====================================================== -->

    <div
        id="pg-home"

        class="page on"
    >

        <!-- HERO -->

        <section class="px-4 pt-3">

            <div class="
                bg-gradient-to-r
                from-blue-600
                to-blue-500
                rounded-2xl
                p-5
                text-white
                relative
                overflow-hidden
            ">

                <div class="
                    absolute
                    -right-4
                    -top-4
                    w-28
                    h-28
                    bg-white/10
                    rounded-full
                "></div>

                <div class="
                    absolute
                    right-6
                    bottom-0
                    w-16
                    h-16
                    bg-white/10
                    rounded-full
                    translate-y-1/3
                "></div>

                <div class="relative">

                    <span class="
                        text-[10px]
                        font-semibold
                        bg-white/20
                        px-2
                        py-0.5
                        rounded-md
                    ">
                        PROMO
                    </span>

                    <h2 class="
                        text-lg
                        font-bold
                        mt-1.5
                    ">
                        Gratis Ongkir
                    </h2>

                    <p class="
                        text-xs
                        opacity-90
                    ">
                        Belanja minimal Rp 50.000
                    </p>

                </div>

            </div>

        </section>


        <!-- CATEGORY -->

        <section class="pt-5">

            <div
                id="catbar"

                class="
                    flex
                    gap-5
                    overflow-x-auto
                    no-scroll
                    px-4
                    pb-1
                "
            ></div>

        </section>


        <!-- PRODUCTS -->

        <section class="px-4 pt-5">

            <!-- STORE -->

            <div class="mb-4">

                <label class="
                    block
                    text-xs
                    font-semibold
                    text-slate-500
                    mb-2
                ">
                    Pilih Cabang
                </label>

                <select
                    id="store-filter"

                    class="
                        w-full
                        h-11
                        rounded-xl
                        border
                        border-slate-200
                        px-4
                        text-sm
                        font-medium
                        bg-white
                    "
                >

                    <option value="">
                        Pilih Cabang
                    </option>

                </select>

            </div>


            <!-- PRODUCT HEADER -->

            <div class="
                flex
                items-center
                justify-between
                mb-3
            ">

                <h2 class="
                    text-sm
                    font-bold
                    text-slate-800
                ">
                    Produk
                </h2>

                <span
                    id="pcnt"

                    class="
                        text-xs
                        text-slate-400
                    "
                >
                    0 item
                </span>

            </div>


            <!-- PRODUCT GRID -->

            <div
                id="pgrid"

                class="
                    grid
                    grid-cols-2
                    gap-2.5
                    stagger
                "
            ></div>

        </section>

    </div>


    <!-- =====================================================
         HISTORY PAGE
    ====================================================== -->

    <div
        id="pg-history"

        class="page"
    >

        <div class="px-4 pt-3">

            <h2 class="
                text-lg
                font-bold
                text-slate-800
                mb-4
            ">
                Riwayat Pesanan
            </h2>

            <div
                id="ord-list"

                class="space-y-3"
            ></div>

            <div
                id="ord-empty"

                class="
                    hidden
                    text-center
                    py-16
                "
            >

                <div class="text-5xl mb-3">
                    📋
                </div>

                <p class="
                    text-slate-600
                    font-semibold
                    text-sm
                ">
                    Belum Ada Pesanan
                </p>

            </div>

        </div>

    </div>

</main>


<!-- =========================================================
     BOTTOM NAV
========================================================= -->

<nav class="
    fixed
    bottom-0
    left-0
    right-0
    z-40
    bg-white
    border-t
    border-slate-100
    safe-b
">

    <div class="
        flex
        items-center
        justify-around
        h-14
    ">

        <button
            data-nav="home"

            class="
                flex
                flex-col
                items-center
                gap-0.5
                px-5
            "
        >

            <span class="
                text-[10px]
                font-medium
            ">
                Beranda
            </span>

        </button>

        <button
            data-nav="history"

            class="
                flex
                flex-col
                items-center
                gap-0.5
                px-5
            "
        >

            <span class="
                text-[10px]
                font-medium
            ">
                Pesanan
            </span>

        </button>

    </div>

</nav>


<!-- =========================================================
     FAB CART
========================================================= -->

<button
    id="fab-cart"

    class="
        fixed
        right-4
        bottom-[76px]
        bg-blue-600
        text-white
        rounded-2xl
        flex
        items-center
        justify-center
        z-30
        tap
        hidden
    "

    style="
        width:52px;
        height:52px;
        box-shadow:0 6px 20px rgba(37,99,235,.35)
    "
>

    🛒

    <span
        id="cart-badge"

        class="
            absolute
            -top-1
            -right-1
            min-w-[18px]
            h-[18px]
            bg-red-500
            text-white
            text-[10px]
            font-bold
            rounded-full
            flex
            items-center
            justify-center
            px-1
        "
    >
        0
    </span>

</button>


<!-- =========================================================
     DIM
========================================================= -->

<div
    id="dim"

    class="
        dim
        fixed
        inset-0
        bg-black/30
        z-50
    "
></div>


<!-- =========================================================
     CART SHEET
========================================================= -->

<div
    id="csheet"

    class="
        sheet
        fixed
        bottom-0
        left-0
        right-0
        bg-white
        rounded-t-2xl
        z-[60]
        max-h-[40vh]
        safe-b
    "
>

    <div class="
        flex
        items-center
        justify-between
        px-4
        py-3
        border-b
        border-slate-100
    ">

        <div class="
            flex
            items-center
            gap-2.5
        ">

            <div>

                <p class="
                    text-sm
                    font-bold
                    text-slate-800
                ">
                    Keranjang
                </p>

                <p
                    id="ccnt"

                    class="
                        text-[10px]
                        text-slate-400
                    "
                >
                    0 item
                </p>

            </div>

        </div>

    </div>

    <div
        id="clist"

        class="
            max-h-40
            overflow-y-auto
            p-4
            space-y-2.5
        "
    ></div>

    <div
        id="cnone"

        class="
            hidden
            flex-col
            items-center
            justify-center
            p-8
        "
    >

        <p class="
            text-slate-600
            font-semibold
            text-sm
        ">
            Keranjang Kosong
        </p>

    </div>

    <div
        id="cft"

        class="
            p-4
            border-t
            border-slate-100
        "
    >

        <div class="
            flex
            justify-between
            mb-3
        ">

            <span class="
                text-sm
                text-slate-500
            ">
                Total
            </span>

            <span
                id="ctotal"

                class="
                    text-lg
                    font-bold
                    text-blue-600
                "
            >
                Rp 0
            </span>

        </div>

        <button
            data-act="checkout"

            class="
                w-full
                py-3
                bg-blue-600
                text-white
                rounded-xl
                font-bold
                text-sm
                tap
            "
        >
            Checkout Sekarang
        </button>

    </div>

</div>


<!-- =========================================================
     SCRIPTS
========================================================= -->

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="/assets/js/supabase.js"></script>

<script src="/assets/js/shared.js"></script>

<script type="module" src="/assets/js/app.js"></script>

</body>
</html>
