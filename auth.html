<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1, user-scalable=no">
  <meta name="theme-color" content="#2563eb">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Masuk — MiniMarket</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;650;700;800&display=swap" rel="stylesheet">
  <link   rel="stylesheet"   href="/assets/css/auth.css" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] },
          colors: {
            brand: {
              50:'#eff6ff',100:'#dbeafe',200:'#bfdbfe',300:'#93c5fd',
              400:'#60a5fa',500:'#3b82f6',600:'#2563eb',700:'#1d4ed8',
              800:'#1e40af',900:'#1e3a8a'
            }
          },
        },
      },
    };
  </script>
</head>
<body>

  <!-- Background decoration -->
  <div class="auth-bg" aria-hidden="true">
    <div class="bg-orb bg-orb-1"></div>
    <div class="bg-orb bg-orb-2"></div>
    <div class="bg-orb bg-orb-3"></div>
  </div>

  <!-- Toast container -->
  <div class="toast-wrap" id="toast-wrap"></div>

  <!-- Main auth wrapper -->
  <div class="auth-shell">

    <!-- Hero header -->
    <header class="auth-hero">
      <div class="hero-inner animate-fade-up">
        <!-- Logo -->
        <div class="hero-logo">
          <div class="logo-icon">
            <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/>
              <line x1="3" y1="6" x2="21" y2="6"/>
              <path d="M16 10a4 4 0 01-8 0"/>
            </svg>
          </div>
          <span class="logo-text">MiniMarket</span>
        </div>
        <p class="hero-subtitle">Belanja mudah & cepat</p>
      </div>
    </header>

    <!-- Auth card -->
    <div class="auth-card animate-fade-up-delay">

      <!-- Tab switcher -->
      <div class="tab-bar" role="tablist">
        <button class="tab-btn active" data-tab="login" role="tab" aria-selected="true" id="tab-login">
          Masuk
        </button>
        <button class="tab-btn" data-tab="register" role="tab" aria-selected="false" id="tab-register">
          Daftar
        </button>
        <div class="tab-indicator" id="tab-indicator"></div>
      </div>

      <!-- ===== LOGIN FORM ===== -->
      <div class="auth-panel active" id="panel-login" role="tabpanel" aria-labelledby="tab-login">
        <form id="form-login" novalidate autocomplete="on">

          <!-- Email -->
          <div class="field-group">
            <label for="login-email" class="field-label">Email</label>
            <div class="field-input-wrap">
              <svg class="field-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="M22 7l-10 7L2 7"/></svg>
              <input
                type="email"
                id="login-email"
                name="email"
                class="field-input"
                placeholder="nama@email.com"
                autocomplete="email"
                required
              >
            </div>
            <p class="field-error" id="login-email-error"></p>
          </div>

          <!-- Password -->
          <div class="field-group">
            <label for="login-password" class="field-label">Password</label>
            <div class="field-input-wrap">
              <svg class="field-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
              <input
                type="password"
                id="login-password"
                name="password"
                class="field-input has-toggle"
                placeholder="Masukkan password"
                autocomplete="current-password"
                required
              >
              <button type="button" class="toggle-pw" data-target="login-password" aria-label="Tampilkan password">
                <svg class="eye-open" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                <svg class="eye-closed hidden" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
              </button>
            </div>
            <p class="field-error" id="login-password-error"></p>
          </div>

          <!-- Remember + Forgot -->
          <div class="flex items-center justify-between mt-1 mb-5">
            <label class="remember-label">
              <input type="checkbox" id="login-remember" class="remember-check">
              <span class="remember-box">
                <svg class="check-icon" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
              </span>
              <span class="remember-text">Ingat saya</span>
            </label>
            <button type="button" class="forgot-link" id="btn-forgot">Lupa password?</button>
          </div>

          <!-- Login button -->
          <button type="submit" class="auth-btn" id="btn-login">
            <span class="btn-label">Masuk</span>
            <svg class="btn-spinner hidden" width="20" height="20" viewBox="0 0 24 24" fill="none">
              <circle cx="12" cy="12" r="10" stroke="rgba(255,255,255,0.25)" stroke-width="3"/>
              <path d="M12 2a10 10 0 019.95 9" stroke="#fff" stroke-width="3" stroke-linecap="round"/>
            </svg>
          </button>
        </form>

        <!-- Register link -->
        <p class="switch-text">
          Belum punya akun?
          <button type="button" class="switch-link" data-goto="register">Daftar sekarang</button>
        </p>
      </div>

      <!-- ===== REGISTER FORM ===== -->
      <div class="auth-panel" id="panel-register" role="tabpanel" aria-labelledby="tab-register">
        <form id="form-register" novalidate autocomplete="on">

          <!-- Nama -->
          <div class="field-group">
            <label for="reg-name" class="field-label">Nama Lengkap</label>
            <div class="field-input-wrap">
              <svg class="field-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
              <input
                type="text"
                id="reg-name"
                name="name"
                class="field-input"
                placeholder="Masukkan nama lengkap"
                autocomplete="name"
                required
              >
            </div>
            <p class="field-error" id="reg-name-error"></p>
          </div>

          <!-- Nomor HP -->
          <div class="field-group">
            <label for="reg-phone" class="field-label">Nomor HP</label>
            <div class="field-input-wrap">
              <svg class="field-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="2" width="14" height="20" rx="2" ry="2"/><line x1="12" y1="18" x2="12.01" y2="18"/></svg>
              <input
                type="tel"
                id="reg-phone"
                name="phone"
                class="field-input"
                placeholder="08xx xxxx xxxx"
                autocomplete="tel"
                required
              >
            </div>
            <p class="field-error" id="reg-phone-error"></p>
          </div>

          <!-- Email -->
          <div class="field-group">
            <label for="reg-email" class="field-label">Email</label>
            <div class="field-input-wrap">
              <svg class="field-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="M22 7l-10 7L2 7"/></svg>
              <input
                type="email"
                id="reg-email"
                name="email"
                class="field-input"
                placeholder="nama@email.com"
                autocomplete="email"
                required
              >
            </div>
            <p class="field-error" id="reg-email-error"></p>
          </div>

          <!-- Password -->
          <div class="field-group">
            <label for="reg-password" class="field-label">Password</label>
            <div class="field-input-wrap">
              <svg class="field-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
              <input
                type="password"
                id="reg-password"
                name="password"
                class="field-input has-toggle"
                placeholder="Minimal 6 karakter"
                autocomplete="new-password"
                required
              >
              <button type="button" class="toggle-pw" data-target="reg-password" aria-label="Tampilkan password">
                <svg class="eye-open" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                <svg class="eye-closed hidden" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
              </button>
            </div>
            <p class="field-error" id="reg-password-error"></p>
          </div>

          <!-- Konfirmasi Password -->
          <div class="field-group">
            <label for="reg-confirm" class="field-label">Konfirmasi Password</label>
            <div class="field-input-wrap">
              <svg class="field-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
              <input
                type="password"
                id="reg-confirm"
                name="confirm"
                class="field-input has-toggle"
                placeholder="Ulangi password"
                autocomplete="new-password"
                required
              >
              <button type="button" class="toggle-pw" data-target="reg-confirm" aria-label="Tampilkan password">
                <svg class="eye-open" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                <svg class="eye-closed hidden" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
              </button>
            </div>
            <p class="field-error" id="reg-confirm-error"></p>
          </div>

          <!-- Register button -->
          <button type="submit" class="auth-btn mt-6" id="btn-register">
            <span class="btn-label">Daftar Sekarang</span>
            <svg class="btn-spinner hidden" width="20" height="20" viewBox="0 0 24 24" fill="none">
              <circle cx="12" cy="12" r="10" stroke="rgba(255,255,255,0.25)" stroke-width="3"/>
              <path d="M12 2a10 10 0 019.95 9" stroke="#fff" stroke-width="3" stroke-linecap="round"/>
            </svg>
          </button>
        </form>

        <!-- Login link -->
        <p class="switch-text">
          Sudah punya akun?
          <button type="button" class="switch-link" data-goto="login">Masuk di sini</button>
        </p>
      </div>

    </div>

    <!-- Footer -->
    <footer class="auth-footer animate-fade-up-delay-2">
      <p class="footer-text">&copy; 2025 MiniMarket &middot; Belanja praktis setiap hari</p>
    </footer>

  </div>

  <!-- Scripts -->
  <script src="/assets/js/supabase.js"></script>
  <script   src="/assets/js/auth.js" ></script>

</body>
</html>
