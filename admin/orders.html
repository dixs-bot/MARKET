<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pesanan — MiniMarket Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;450;500;600;650;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="orders.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] },
          colors: {
            brand: {
              50:'#eff6ff',100:'#dbeafe',200:'#bfdbfe',300:'#93c5fd',
              400:'#60a5fa',500:'#3b82f6',600:'#2563eb',700:'#1d4ed8',
              800:'#1e40af',900:'#1e3a8a'
            }
          },
          animation: {
            'blob-1':'blobFloat1 20s ease-in-out infinite',
            'blob-2':'blobFloat2 24s ease-in-out infinite',
            'blob-3':'blobFloat3 22s ease-in-out infinite',
            'fade-up':'fadeUp 0.6s cubic-bezier(0.16,1,0.3,1) both',
            'fade-up-d1':'fadeUp 0.6s cubic-bezier(0.16,1,0.3,1) 0.06s both',
            'fade-up-d2':'fadeUp 0.6s cubic-bezier(0.16,1,0.3,1) 0.12s both',
            'badge-pulse':'badgePulse 2.5s ease-in-out infinite',
            'counter-pop':'counterPop 0.4s cubic-bezier(0.16,1,0.3,1) both',
            'modal-in':'modalIn 0.35s cubic-bezier(0.16,1,0.3,1) both',
            'modal-out':'modalOut 0.25s cubic-bezier(0.4,0,1,1) both',
            'toast-in':'toastIn 0.4s cubic-bezier(0.16,1,0.3,1) both',
            'toast-out':'toastOut 0.3s cubic-bezier(0.4,0,1,1) both',
            'shimmer':'shimmer 1.8s ease-in-out infinite',
          },
          keyframes: {
            blobFloat1:{ '0%,100%':{transform:'translate(0,0) scale(1)'},'33%':{transform:'translate(50px,-30px) scale(1.08)'},'66%':{transform:'translate(-25px,40px) scale(0.94)'}},
            blobFloat2:{ '0%,100%':{transform:'translate(0,0) scale(1)'},'33%':{transform:'translate(-40px,25px) scale(1.05)'},'66%':{transform:'translate(35px,-50px) scale(0.96)'}},
            blobFloat3:{ '0%,100%':{transform:'translate(0,0) scale(1)'},'33%':{transform:'translate(25px,40px) scale(0.95)'},'66%':{transform:'translate(-45px,-15px) scale(1.06)'}},
            fadeUp:{ '0%':{opacity:'0',transform:'translateY(16px)'},'100%':{opacity:'1',transform:'translateY(0)'}},
            badgePulse:{ '0%,100%':{boxShadow:'0 0 0 0 rgba(37,99,235,0.15)'},'50%':{boxShadow:'0 0 0 6px rgba(37,99,235,0)'}},
            counterPop:{ '0%':{transform:'scale(0.6)'},'60%':{transform:'scale(1.15)'},'100%':{transform:'scale(1)'}},
            modalIn:{ '0%':{opacity:'0',transform:'scale(0.94) translateY(8px)'},'100%':{opacity:'1',transform:'scale(1) translateY(0)'}},
            modalOut:{ '0%':{opacity:'1',transform:'scale(1) translateY(0)'},'100%':{opacity:'0',transform:'scale(0.94) translateY(8px)'}},
            toastIn:{ '0%':{opacity:'0',transform:'translateY(-10px) scale(0.96)'},'100%':{opacity:'1',transform:'translateY(0) scale(1)'}},
            toastOut:{ '0%':{opacity:'1',transform:'translateY(0) scale(1)'},'100%':{opacity:'0',transform:'translateY(-10px) scale(0.96)'}},
            shimmer:{ '0%':{backgroundPosition:'-400px 0'},'100%':{backgroundPosition:'400px 0'}},
          },
        },
      },
    };
  </script>
</head>
<body class="flex items-center justify-center min-h-[100dvh]">

  <!-- Background blobs -->
  <div class="blob w-[400px] h-[400px] bg-brand-200 opacity-40 animate-blob-1" style="top:-8%;right:-5%"></div>
  <div class="blob w-[320px] h-[320px] bg-blue-100 opacity-50 animate-blob-2" style="bottom:5%;left:-6%"></div>
  <div class="blob w-[250px] h-[250px] bg-indigo-100 opacity-35 animate-blob-3" style="top:40%;right:30%"></div>

  <!-- Toast container -->
  <div class="toast-container" id="toast-container"></div>

  <!-- Delete confirmation modal -->
  <div class="modal-backdrop hidden" id="delete-modal">
    <div class="fixed inset-0 flex items-center justify-center p-4 z-[850]" data-action="backdrop-close" data-modal="delete">
      <div class="modal-card w-full max-w-sm p-7 animate-modal-in" id="delete-modal-card" data-action="modal-content">
        <div class="w-12 h-12 rounded-2xl bg-red-50 flex items-center justify-center mb-4 mx-auto">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#dc2626" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>
        </div>
        <h3 class="text-lg font-semibold text-slate-800 text-center">Hapus Pesanan?</h3>
        <p class="text-sm text-slate-400 text-center mt-2 leading-relaxed">Pesanan <span id="delete-order-id" class="font-medium text-slate-500"></span> akan dihapus secara permanen. Tindakan ini tidak dapat dibatalkan.</p>
        <div class="flex gap-3 mt-6">
          <button class="btn-action btn-cancel-modal flex-1 justify-center h-11" data-action="cancel-delete">Batal</button>
          <button class="btn-action btn-confirm-delete flex-1 justify-center h-11 font-semibold" data-action="confirm-delete">Hapus</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Status update modal -->
  <div class="modal-backdrop hidden" id="status-modal">
    <div class="fixed inset-0 flex items-center justify-center p-4 z-[850]" data-action="backdrop-close" data-modal="status">
      <div class="modal-card w-full max-w-xs p-7 animate-modal-in" id="status-modal-card" data-action="modal-content">
        <div class="w-12 h-12 rounded-2xl bg-brand-50 flex items-center justify-center mb-4 mx-auto">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#2563eb" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>
        </div>
        <h3 class="text-lg font-semibold text-slate-800 text-center">Update Status</h3>
        <p class="text-sm text-slate-400 text-center mt-1.5">Pesanan <span id="status-order-id" class="font-medium text-slate-500"></span></p>
        <div class="mt-5 space-y-2" id="status-options"></div>
        <button class="btn-action btn-cancel-modal w-full justify-center h-11 mt-4" data-action="cancel-status">Batal</button>
      </div>
    </div>
  </div>

  <!-- Sticky glassmorphism header -->
  <header class="glass-header fixed top-0 left-0 right-0 z-50 animate-fade-up">
    <div class="max-w-5xl mx-auto px-4 sm:px-6 h-[60px] flex items-center justify-between">
      <div class="flex items-center gap-3">
        <a href="/admin/index.html" class="back-btn w-9 h-9 rounded-xl flex items-center justify-center text-slate-400" aria-label="Kembali">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
        </a>
        <h1 class="text-[15px] font-semibold text-slate-800 tracking-tight">Pesanan</h1>
        <span class="counter-badge animate-badge-pulse" id="order-counter">0</span>
      </div>
      <button class="w-9 h-9 rounded-xl flex items-center justify-center text-slate-400 hover:text-slate-600 hover:bg-slate-50 transition-all duration-200" aria-label="Notifikasi">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg>
      </button>
    </div>
  </header>

  <!-- Main content -->
  <main class="relative z-10 max-w-5xl mx-auto px-4 sm:px-6 pt-[84px] pb-16 w-full">

    <!-- Search & filter bar -->
    <section class="mb-6 animate-fade-up-d1">
      <div class="flex flex-col sm:flex-row gap-3 items-start sm:items-center">
        <div class="relative w-full sm:w-72 shrink-0">
          <svg class="absolute left-3.5 top-1/2 -translate-y-1/2 text-slate-300 pointer-events-none" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input type="text" id="search-input" class="search-input w-full h-[42px] rounded-xl pl-10 pr-4 text-[13.5px] text-slate-700 font-medium" placeholder="Cari pesanan, customer..." aria-label="Cari pesanan">
        </div>
        <div class="flex gap-1.5 overflow-x-auto no-scrollbar w-full sm:w-auto pb-0.5 -mb-0.5" id="filter-tabs" role="tablist">
          <button class="filter-tab active" data-action="filter" data-filter="all" role="tab" aria-selected="true">Semua</button>
          <button class="filter-tab" data-action="filter" data-filter="pending" role="tab" aria-selected="false">Menunggu</button>
          <button class="filter-tab" data-action="filter" data-filter="processing" role="tab" aria-selected="false">Diproses</button>
          <button class="filter-tab" data-action="filter" data-filter="shipped" role="tab" aria-selected="false">Dikirim</button>
          <button class="filter-tab" data-action="filter" data-filter="delivered" role="tab" aria-selected="false">Selesai</button>
          <button class="filter-tab" data-action="filter" data-filter="cancelled" role="tab" aria-selected="false">Dibatalkan</button>
        </div>
      </div>
    </section>

    <!-- Orders container (dynamically populated) -->
    <section id="orders-container" class="space-y-4" aria-label="Daftar pesanan"></section>

    <!-- Empty state (hidden by default) -->
    <section id="empty-state" class="hidden py-20">
      <div class="text-center">
        <div class="empty-state-icon mx-auto mb-5">
          <svg width="34" height="34" viewBox="0 0 24 24" fill="none" stroke="#3b82f6" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>
        </div>
        <h3 class="text-base font-semibold text-slate-700" id="empty-title">Belum ada pesanan</h3>
        <p class="text-sm text-slate-400 mt-1.5 max-w-[260px] mx-auto leading-relaxed" id="empty-desc">Pesanan baru akan muncul di sini secara otomatis.</p>
      </div>
    </section>

  </main>

<!-- Supabase -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="/assets/js/supabase.js"></script>

<!-- Orders modules -->
<script src="ordersService.js"></script>

<script src="ordersUI.js"></script>

<script src="ordersController.js"></script>

</body>
</html>
