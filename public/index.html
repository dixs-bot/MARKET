<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>MiniMarket - Belanja Praktis</title>

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<script>
tailwind.config = {
  theme: {
    extend: {
      fontFamily: {
        sans: ['Inter','sans-serif']
      }
    }
  }
}
</script>

<link rel="stylesheet" href="assets/css/style.css">

<style>
#pg-checkout{
  position:fixed;
  inset:0;
  background:#fff;
  z-index:50;
  display:flex;
  flex-direction:column;
  height:100dvh;
}

/* SCROLL SAJA, TANPA FLEX COLUMN */
#checkout-scroll{
  flex:1;
  overflow-y:auto;
  -webkit-overflow-scrolling:touch;
}
</style>

</head>
<body>

<!-- ================= CHECKOUT ================= -->
<div id="pg-checkout" style="display:none;">

<header class="sticky top-0 bg-white z-10 border-b border-slate-100">
<div class="flex items-center justify-between px-4 h-14">
<button data-act="back-to-cart">←</button>
<h1 class="text-sm font-bold">Checkout</h1>
<div></div>
</div>
</header>

<!-- SCROLL AREA -->
<div id="checkout-scroll" class="p-4 space-y-3 min-h-screen">

<section class="bg-slate-50 rounded-2xl p-4">
<p class="text-sm font-semibold">Alamat</p>
<textarea class="w-full border p-2 rounded"></textarea>
</section>

<section class="bg-slate-50 rounded-2xl p-4">
<p class="text-sm font-semibold">Pengiriman</p>
</section>

<section class="bg-slate-50 rounded-2xl p-4">
<p class="text-sm font-semibold">Pembayaran</p>
</section>

<section class="bg-slate-50 rounded-2xl p-4">
<p class="text-sm font-semibold">Catatan</p>
<textarea class="w-full border p-2 rounded"></textarea>
</section>

<!-- ✅ TOMBOL LANGSUNG DI BAWAH CATATAN -->
<div class="mt-4 space-y-2">

<button data-act="back-to-cart" class="w-full py-2 text-xs text-slate-500">
Kembali ke Keranjang
</button>

<button id="btn-order" class="w-full py-3 bg-blue-600 text-white rounded-xl font-bold">
Pesan Sekarang
</button>

<p class="text-center text-[10px] text-slate-400">
Lengkapi semua data
</p>

</div>

</div>

</div>

<script>
function openCheckout(){
  document.getElementById('pg-checkout').style.display = 'flex';
}

function closeCheckout(){
  document.getElementById('pg-checkout').style.display = 'none';
}
</script>

</body>
</html>
