<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>MiniMarket</title>

<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="assets/css/style.css">

</head>
<body>

<!-- ================= CHECKOUT ================= -->
<div id="pg-checkout" class="checkout hidden">

<!-- HEADER -->
<header class="checkout-header">
<button data-act="back-to-cart">←</button>
<h1>Checkout</h1>
<div></div>
</header>

<!-- CONTENT -->
<div class="checkout-content">

<section class="card">
<p>Alamat</p>
<textarea></textarea>
</section>

<section class="card">
<p>Pengiriman</p>
</section>

<section class="card">
<p>Pembayaran</p>
</section>

<section class="card">
<p>Catatan</p>
<textarea></textarea>
</section>

</div>

<!-- FOOTER (INI KUNCI FIX) -->
<div class="checkout-footer">

<button class="back-btn">
Kembali ke Keranjang
</button>

<button id="btn-order">
Pesan Sekarang
</button>

<p class="hint">
Lengkapi semua data
</p>

</div>

</div>

</body>
</html>
